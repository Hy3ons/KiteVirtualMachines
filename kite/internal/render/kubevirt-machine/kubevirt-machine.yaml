# 02-virtualmachine.yaml
apiVersion: kubevirt.io/v1
kind: VirtualMachine

metadata:
  name: {{ .VmName }}
  namespace: {{ .Namespace }}

spec:
  running: true
  template:
    spec:
      domain:
        resources:
          requests: { memory: {{ .Memory }}, cpu: {{ .CPU }} }
        devices:
          disks:
            - name: rootdisk
              disk: { bus: virtio }
            - name: cloudinitdisk
              disk: { bus: virtio }
      volumes:
        - name: rootdisk
          dataVolume: { name: {{ .VmName }}-disk }
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name : {{ .VmName }}-cloud-init-userdata