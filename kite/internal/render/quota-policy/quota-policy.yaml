apiVersion: v1
kind: ResourceQuota
metadata:
  name: { { .VmName } }
  namespace: { { .Namespace } }

spec:
  hard:
    requests.cpu: "4"
    requests.memory: 2Gi
    persistentvolumeclaims: "5"
    count/virtualmachines.kubevirt.io: "2"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: { { .VmName } }
  namespace: { { .Namespace } }
spec:
  limits:
    - default:
        memory: 1024Mi
        cpu: 1000m
      defaultRequest:
        memory: 256Mi
        cpu: 250m
      type: Container
