apiVersion: v1
kind: Secret
metadata:
  name: {{ .VmName }}-cloud-init-userdata
  namespace: {{ .Namespace }}
  labels:
    hy3ons.github.io/managed-by: kite-controller
    hy3ons.github.io/kite-vm-name: {{ .VmName }}
    hy3ons.github.io/kite-vm-namespace: {{ .Namespace }}

stringData:
  userdata: |
    #cloud-config
    # L3 계층 활성화 작업 빠르게 끝내기
    bootcmd:
      - [ systemctl, mask, systemd-networkd-wait-online.service ]
      - [ systemctl, mask, NetworkManager-wait-online.service ]
      - echo "DefaultTimeoutStartSec=10s" >> /etc/systemd/system.conf

    # 1. Root 계정 보안 및 접근 설정
    hostname: {{ .VmName }}
    disable_root: false
    ssh_deletekeys: false
    ssh_pwauth: true
    ssh_authorized_keys:
      - {{ .SSHPublicKey }}
    users:
      - default
      - name: {{ .Id }}
        groups: [adm, sudo]
        shell: /bin/bash
        lock_passwd: false
        sudo: ["ALL=(ALL) NOPASSWD:ALL"]
        ssh_authorized_keys:
          - {{ .SSHPublicKey }}

    # VM 재시작 후에도 NIC가 내려가 있으면 다시 올리고 DHCP를 갱신한다.
    write_files:
      - path: /usr/local/sbin/kite-network-restore.sh
        permissions: '0755'
        owner: root:root
        content: |
          #!/bin/bash
          set -euo pipefail

          iface="$(ip -o link show | awk -F': ' '$2 != "lo" { print $2; exit }')"
          if [ -z "$iface" ]; then
            exit 0
          fi

          ip link set "$iface" up || true

          if command -v dhclient >/dev/null 2>&1; then
            dhclient "$iface" -nw || true
            exit 0
          fi

          if command -v netplan >/dev/null 2>&1; then
            netplan apply || true
          fi

          systemctl restart systemd-networkd 2>/dev/null || true
      - path: /etc/systemd/system/kite-network-restore.service
        permissions: '0644'
        owner: root:root
        content: |
          [Unit]
          Description=Restore Kite VM network after boot
          After=network-pre.target
          Wants=network-pre.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/kite-network-restore.sh
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    # 2. 시스템 부팅 시 실행할 명령어 (런타임 설정)
    runcmd:
      # sshd 서버 실행을 위한 준비 VM 시작시 /run 초기화되어 sshd가 실행되지 않음
      - mkdir -p /run/sshd
      - chmod 755 /run/sshd

      # sshd 서비스를 위한 RuntimeDirectory 설정
      - sed -i '/\[Service\]/a RuntimeDirectory=sshd\nRuntimeDirectoryMode=0755' /lib/systemd/system/ssh.service
      - systemctl daemon-reload

      # SSHD 설정 수정: Kite gateway가 관리하는 SSH key로 접속한다.
      - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
      - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
      
      # SSH 서비스 재시작 (변경사항 적용)
      - systemctl restart ssh

      # VM 재시작마다 NIC UP/DHCP 복구가 실행되도록 systemd에 등록
      - systemctl enable kite-network-restore.service
      - systemctl start kite-network-restore.service
      
      # 터미널 프롬프트 설정 (요청하신 초록색 호스트네임)
      - echo 'export PS1="\[\e[32m\]\u@\h\[\e[m\]:\[\e[34m\]\w\[\e[m\]\$ "' >> /root/.bashrc

      # (옵션) 환영 메시지 추가
      - apt-get update
      - apt-get install -y figlet
      - figlet "Virtual Cloud" > /etc/motd

    # 3. 마지막 리포트 생성 (디버깅용)
    final_message: "The system is finally up, after $UPTIME seconds"
