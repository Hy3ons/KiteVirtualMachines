apiVersion: v1
kind: Service

metadata:
  name: vps-access-{{ .VmName }}
  namespace: {{ .Namespace }}
  labels:
    kite.anacnu.com/managed-by: kite-controller
    kite.anacnu.com/kite-vm-name: {{ .VmName }}
    kite.anacnu.com/kite-vm-namespace: {{ .Namespace }}

spec:
  type: ClusterIP
  selector:
    vm.kubevirt.io/name: {{ .VmName }}
  ports:
    - port: 22
      targetPort: 22

---
apiVersion: v1
kind: Service
metadata:
  name: vps-web-{{ .VmName }}
  namespace: {{ .Namespace }}
  labels:
    kite.anacnu.com/managed-by: kite-controller
    kite.anacnu.com/kite-vm-name: {{ .VmName }}
    kite.anacnu.com/kite-vm-namespace: {{ .Namespace }}
spec:
  type: ClusterIP
  selector:
    vm.kubevirt.io/name: {{ .VmName }}
  ports:
    - port: 80
      targetPort: 80
