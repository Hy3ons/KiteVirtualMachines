apiVersion: v1
kind: Service

metadata:
  name: vps-access-{{ .VmName }}
  namespace: {{ .Namespace }}

spec:
  type: NodePort
  selector:
    vm.kubevirt.io/name: {{ .VmName }}
  ports:
    - port: 22
      targetPort: 22
      nodePort: {{ .NodePort }}

---
apiVersion: v1
kind: Service
metadata:
  name: vps-web-{{ .VmName }}
  namespace: {{ .Namespace }}
spec:
  type: NodePort
  selector:
    vm.kubevirt.io/name: {{ .VmName }}
  ports:
    - port: 80
      targetPort: 80
