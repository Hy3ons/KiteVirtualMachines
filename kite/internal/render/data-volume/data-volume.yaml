apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume

metadata:
  name: {{ .VmName }}         # 사용자가 가질 실제 디스크 이름
  namespace: {{ .Namespace }}

spec:
  source:
    pvc:
      name: {{ .VmImage }}
      namespace: kite     # 다른 네임스페이스의 원본을 참조

  pvc:
    accessModes: ["ReadWriteOnce"]
    storageClassName: local-path # local-path
    resources:
      requests:
        storage: {{ .Storage }}