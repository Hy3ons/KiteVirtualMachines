apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kite-platform
  namespace: {{ .Namespace }}
  labels:
    hy3ons.github.io/managed-by: kite-controller
    hy3ons.github.io/platform-ingress: "true"

spec:
  rules:
    - {{ if .Host }}host: {{ .Host }}
      {{ end }}http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kite-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kite-frontend
                port:
                  number: 80
