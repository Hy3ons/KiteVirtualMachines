apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kite-platform
  namespace: {{ .Namespace }}
  labels:
    hy3ons.github.io/managed-by: kite-controller
    hy3ons.github.io/platform-ingress: "true"
  {{ if .ForceHTTPS }}
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  {{ end }}

spec:
  {{ if .TLSSecretName }}
  tls:
    - hosts:
        - {{ .Host }}
      secretName: {{ .TLSSecretName }}
  {{ end }}
  rules:
    - host: {{ .Host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kite-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kite-frontend
                port:
                  number: 80
