apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .VmName }}
  namespace: {{ .Namespace }}
  labels:
    hy3ons.github.io/managed-by: kite-controller
    hy3ons.github.io/kite-vm-name: {{ .VmName }}
    hy3ons.github.io/kite-vm-namespace: {{ .Namespace }}

  annotations:
    kubernetes.io/ingress.class: traefik

    # HTTPS로 자동 리다이렉트를 원할 경우 추가합니다.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

    # Legacy cloud-admin traffic interceptor is intentionally disabled.
    # traefik.ingress.kubernetes.io/router.middlewares: cloud-admin-vm-traffic-interceptor@kubernetescrd

spec:
  {{ if .TLSSecretName }}
  tls:
    - hosts:
        - {{ .DomainName }}
      secretName: {{ .TLSSecretName }}
  {{ end }}

  rules:
    - host: {{ .DomainName }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vps-web-{{ .VmName }}
                port:
                  number: 80
