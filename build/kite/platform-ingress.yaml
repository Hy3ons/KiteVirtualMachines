apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kite-platform
  namespace: kite
  labels:
    hy3ons.github.io/managed-by: kite-install
    hy3ons.github.io/platform-ingress: "true"
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kite-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kite-frontend
                port:
                  number: 80
