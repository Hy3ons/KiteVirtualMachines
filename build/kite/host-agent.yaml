apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kite-host-agent
  namespace: kite
  labels:
    app: kite-host-agent
spec:
  selector:
    matchLabels:
      app: kite-host-agent
  template:
    metadata:
      labels:
        app: kite-host-agent
    spec:
      serviceAccountName: kite-control-plane
      hostPID: true
      containers:
        - name: kite-host-agent
          image: ghcr.io/hy3ons/kite-host-agent:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: KITE_HOST_AGENT_HOST_ROOT
              value: /host
            - name: KITE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-var-lib-kite
              mountPath: /host/var/lib/kite
            - name: host-home
              mountPath: /host/home
      volumes:
        - name: host-var-lib-kite
          hostPath:
            path: /var/lib/kite
            type: DirectoryOrCreate
        - name: host-home
          hostPath:
            path: /home
            type: Directory
