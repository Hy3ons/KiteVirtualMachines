apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kite-api-role
rules:
  - apiGroups: ["hy3ons.github.io"]
    resources: ["kiteusers", "kitevirtualmachines", "kitevirtualmachineoffers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hy3ons.github.io"]
    resources: ["kiteusers/status", "kitevirtualmachines/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["hy3ons.github.io"]
    resources: ["kitevirtualmachineoffers/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources: ["virtualmachineinstances/console"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kite-api-binding
subjects:
  - kind: ServiceAccount
    name: kite-api
    namespace: kite
roleRef:
  kind: ClusterRole
  name: kite-api-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kite-controller-role
rules:
  - apiGroups: ["hy3ons.github.io"]
    resources: ["kiteusers", "kiteusers/status", "kitevirtualmachines", "kitevirtualmachines/status", "kitevirtualmachineoffers", "kitevirtualmachineoffers/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "persistentvolumeclaims", "services", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances", "virtualmachineinstancemigrations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes", "datavolumes/source"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources: ["virtualmachines/start", "virtualmachines/stop", "virtualmachines/restart"]
    verbs: ["update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kite-controller-binding
subjects:
  - kind: ServiceAccount
    name: kite-controller
    namespace: kite
roleRef:
  kind: ClusterRole
  name: kite-controller-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kite-gateway-role
rules:
  - apiGroups: ["hy3ons.github.io"]
    resources: ["kitevirtualmachines"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kite-gateway-binding
subjects:
  - kind: ServiceAccount
    name: kite-gateway
    namespace: kite
roleRef:
  kind: ClusterRole
  name: kite-gateway-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kite-control-plane-role
rules: []

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kite-control-plane-binding
subjects:
  - kind: ServiceAccount
    name: kite-control-plane
    namespace: kite
roleRef:
  kind: ClusterRole
  name: kite-control-plane-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cdi-cloner-source-pvc-reader
  namespace: kite
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes/source"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdi-cloner-binding
  namespace: kite
subjects:
  - kind: ServiceAccount
    name: cdi-sa
    namespace: cdi
  - kind: ServiceAccount
    name: kite-controller
    namespace: kite
roleRef:
  kind: Role
  name: cdi-cloner-source-pvc-reader
  apiGroup: rbac.authorization.k8s.io
