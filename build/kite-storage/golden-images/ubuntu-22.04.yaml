apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: ubuntu-22.04
  namespace: kite
spec:
  source:
    http:
      url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
  pvc:
    storageClassName: kite-vm-storage
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: 4Gi
