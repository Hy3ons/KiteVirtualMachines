apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kite-longhorn-disk-cleanup
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: kite-longhorn-disk-cleanup
    hy3ons.github.io/managed-by: kite-storage
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kite-longhorn-disk-cleanup
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kite-longhorn-disk-cleanup
        hy3ons.github.io/managed-by: kite-storage
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: cleanup
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              rm -rf /host/mnt/kite-longhorn
              sleep 5
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: host-mnt
              mountPath: /host/mnt
      volumes:
        - name: host-mnt
          hostPath:
            path: /mnt
            type: DirectoryOrCreate
