apiVersion: v1
kind: Namespace

metadata:
  name: kite
  labels:
    name: kite

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kite-account
  namespace: kite

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kite-limited-manager-role
rules:
  # KubeVirt 핵심 리소스 관리
  - apiGroups: ["kubevirt.io"]
    resources:
      [
        "virtualmachines",
        "virtualmachineinstances",
        "virtualmachineinstancemigrations",
      ]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # CDI (디스크 복제/관리) 리소스 관리
  # - datavolumes: 사용자 namespace에 VM별 디스크 DataVolume을 생성/수정/삭제하기 위한 권한
  # - datavolumes/source: source PVC를 사용하는 clone 요청을 만들 때 필요한 CDI subresource 권한
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes", "datavolumes/source"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # K8s 기본 리소스 (디스크 및 설정 관련)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "services", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # 부팅 및 상태 확인을 위해 필요한 추가 권한
  - apiGroups: ["subresources.kubevirt.io"]
    resources:
      [
        "virtualmachines/start",
        "virtualmachines/stop",
        "virtualmachines/restart",
      ]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kite-vm-cluster-manager-binding
subjects:
  - kind: ServiceAccount
    name: kite-account
    namespace: kite
roleRef:
  kind: ClusterRole
  name: kite-limited-manager-role
  apiGroup: rbac.authorization.k8s.io

---
# CDI cross-namespace clone 권한
#
# VM별 DataVolume은 사용자 namespace에 생성되지만, source PVC는 kite namespace의
# golden image PVC(예: kite/ubuntu-22.04)를 참조한다.
#
# 이 Role은 "source namespace인 kite" 안에서만 유효하다.
# - persistentvolumeclaims get/list/watch:
#   CDI와 controller가 kite/ubuntu-22.04 PVC 존재 여부와 상태를 확인하기 위해 필요하다.
# - datavolumes/source create:
#   다른 namespace의 DataVolume이 kite namespace의 source PVC를 clone/import source로
#   사용할 수 있도록 CDI가 요구하는 권한이다.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cdi-cloner-source-pvc-reader
  namespace: kite
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes/source"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: cdi-cloner-binding
  namespace: kite

subjects:
  # CDI controller가 source PVC(kite/ubuntu-22.04)를 읽고 clone/import 작업을 진행한다.
  # CDI 설치 방식에 따라 이 ServiceAccount 이름이 달라질 수 있으면,
  # `kubectl get sa -n cdi`로 실제 이름을 확인해야 한다.
  - kind: ServiceAccount
    name: cdi-sa
    namespace: cdi

  # kite-controller는 kite-account로 사용자 namespace의 DataVolume을 생성한다.
  # Kubernetes admission/CDI authorization은 "요청을 만든 주체"가 source namespace에서
  # datavolumes/source create 권한을 가지는지도 확인하므로 kite-account도 묶어준다.
  - kind: ServiceAccount
    name: kite-account
    namespace: kite

roleRef:
  kind: Role
  name: cdi-cloner-source-pvc-reader
  apiGroup: rbac.authorization.k8s.io

---
