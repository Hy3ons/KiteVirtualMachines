name: Test GHCR Image Builds

on:
  pull_request:
  push:
    branches:
      - dev
      - stage
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: hy3ons

jobs:
  build:
    name: Build ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: kite-api
            image: kite-api
            context: ./kite
            dockerfile: ./kite/Dockerfile.api
          - component: kite-controller
            image: kite-controller
            context: ./kite
            dockerfile: ./kite/Dockerfile.controller
          - component: kite-gateway
            image: kite-gateway
            context: ./kite
            dockerfile: ./kite/Dockerfile.gateway
          - component: kite-frontend
            image: kite-frontend
            context: ./kite-frontend
            dockerfile: ./kite-frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build ${{ matrix.component }} without push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: linux/amd64
          build-args: |
            VITE_BUILD_MODE=production
            VITE_API_BASE_URL=/api/v1
            VITE_USE_MOCK=false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:ci-${{ github.sha }}
