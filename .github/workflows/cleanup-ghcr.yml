name: Cleanup GHCR Images

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print deletion candidates without deleting package versions."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Remove expired SHA image tags
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup expired GHCR package versions
        uses: actions/github-script@v7
        with:
          script: |
            const packages = [
              "kite-api",
              "kite-controller",
              "kite-gateway",
              "kite-frontend",
            ];
            const protectedTags = new Set([
              "latest",
              "main",
              "production",
              "stage",
            ]);
            const policies = [
              { name: "main sha", pattern: /^sha-[0-9a-f]+$/i, days: 30 },
              { name: "stage sha", pattern: /^stage-sha-[0-9a-f]+$/i, days: 10 },
            ];
            const dayMs = 24 * 60 * 60 * 1000;
            const now = Date.now();
            const dryRun = core.getInput("dry_run") === "true";
            const owner = context.repo.owner;
            const ownerInfo = await github.rest.users.getByUsername({ username: owner });
            const ownerIsOrg = ownerInfo.data.type === "Organization";

            function policyForTag(tag) {
              return policies.find((policy) => policy.pattern.test(tag));
            }

            function describeTags(tags) {
              return tags.length > 0 ? tags.join(", ") : "<untagged>";
            }

            function decide(version) {
              const tags = version.metadata?.container?.tags ?? [];
              if (tags.length === 0) {
                return { delete: false, reason: "untagged version is protected by policy" };
              }

              const createdAt = new Date(version.created_at).getTime();
              for (const tag of tags) {
                if (protectedTags.has(tag)) {
                  return { delete: false, reason: `protected moving tag ${tag}` };
                }

                const policy = policyForTag(tag);
                if (!policy) {
                  return { delete: false, reason: `unmanaged tag ${tag} is protected by policy` };
                }

                const expireAt = createdAt + policy.days * dayMs;
                if (now < expireAt) {
                  const ageDays = Math.floor((now - createdAt) / dayMs);
                  return {
                    delete: false,
                    reason: `${tag} is ${ageDays}d old; ${policy.name} retention is ${policy.days}d`,
                  };
                }
              }

              return { delete: true, reason: "all tags on this version are expired managed SHA tags" };
            }

            async function listVersions(packageName) {
              const params = {
                package_type: "container",
                package_name: packageName,
                per_page: 100,
              };

              if (ownerIsOrg) {
                return github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                  { org: owner, ...params },
                );
              }

              return github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                { username: owner, ...params },
              );
            }

            async function deleteVersion(packageName, versionId) {
              const params = {
                package_type: "container",
                package_name: packageName,
                package_version_id: versionId,
              };

              if (ownerIsOrg) {
                await github.rest.packages.deletePackageVersionForOrg({ org: owner, ...params });
                return;
              }

              await github.rest.packages.deletePackageVersionForUser({ username: owner, ...params });
            }

            for (const packageName of packages) {
              core.info(`Checking ${owner}/${packageName}`);
              const versions = await listVersions(packageName);

              for (const version of versions) {
                const tags = version.metadata?.container?.tags ?? [];
                const decision = decide(version);
                const summary = `${packageName}@${version.id} tags=${describeTags(tags)} created=${version.created_at}`;

                if (!decision.delete) {
                  core.info(`Keep ${summary}: ${decision.reason}`);
                  continue;
                }

                if (dryRun) {
                  core.info(`Dry run delete ${summary}: ${decision.reason}`);
                  continue;
                }

                core.info(`Delete ${summary}: ${decision.reason}`);
                await deleteVersion(packageName, version.id);
              }
            }
