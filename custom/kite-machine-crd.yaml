apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: kitevirtualmachines.anacnu.com

spec:
  group: anacnu.com

  versions:
    - name: v1
      served: true
      storage: true

      subresources:
        status: {}

      additionalPrinterColumns:
        - name: Status
          type: string
          jsonPath: .status.phase

        - name: CPU
          type: integer
          jsonPath: .spec.cpu

        - name: MEM
          type: string
          jsonPath: .spec.memory

        - name: IMAGE
          type: string
          jsonPath: .spec.image

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec: # 사용자가 입력할 설정값
              type: object

              properties:
                cpu:
                  type: integer
                memory:
                  type: string
                image:
                  type: string
                disk:
                  type: string
                powerState: # On / Off
                  type: string
                  enum: ["On", "Off"]
                domainPrefix:
                  type: string
                sshId:
                  type: string
                sshPassword:
                  type: string
                delete:
                  type: boolean

            status:
              type: object
              properties:
                phase:
                  type: string

                currentPowerState:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                domain:
                  type: string
                nodeName:
                  type: string
                sshKeySecretName:
                  type: string
                cloudInitSecretName:
                  type: string
                serviceName:
                  type: string
                dataVolumeName:
                  type: string
                dataVolumePhase:
                  type: string
                dataVolumeProgress:
                  type: string
                dataVolumeMessage:
                  type: string

                conditions:
                  type: array

                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string } # True, False, Unknown
                      lastTransitionTime: { type: string, format: date-time }
                      reason: { type: string }
                      message: { type: string }
                      observedGeneration: { type: integer, format: int64 }

  names:
    kind: KiteVirtualMachine
    plural: kitevirtualmachines
    singular: kitevirtualmachine

    shortNames:
      - ktvm
    categories:
      - kite
      - all

  scope: Namespaced # 네임스페이스별로 관리
